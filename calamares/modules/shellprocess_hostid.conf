# Regenerate per-host cryptographic identity in the target.
#
# The live media ships a baked-in snakeoil certificate and OpenSSH host keys.
# These must be regenerated so the installed system has a unique identity.
# Runs inside the target (dontChroot: false), guarded on the relevant binary
# being present so the step is a no-op when the package is not installed.
---
dontChroot: false
timeout: 300

script:
    # default snakeoil certificate, regenerated for the new hostname
    - "- test -x /usr/sbin/make-ssl-cert && make-ssl-cert generate-default-snakeoil --force-overwrite"

    # fresh OpenSSH host keys for the new host
    - command: |
        - if [ -x /usr/sbin/sshd ]; then
            rm -f /etc/ssh/ssh_host_*
            DEBIAN_FRONTEND=noninteractive dpkg-reconfigure --frontend=noninteractive openssh-server
          fi
      timeout: 120

i18n:
    name: "Regenerate host identity"
