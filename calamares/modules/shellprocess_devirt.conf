# Remove virtual-machine guest tooling on bare metal.
#
# The live image ships spice-vdagent and qemu-guest-agent so the live session
# behaves well inside a VM. When the target is not virtualised they are dead
# weight, so purge them. Runs inside the target (dontChroot: false).
---
dontChroot: false
timeout: 120

script:
    - "- if ! systemd-detect-virt --quiet; then DEBIAN_FRONTEND=noninteractive dpkg --purge spice-vdagent qemu-guest-agent; fi"

i18n:
    name: "Remove virtualisation guest tooling"
