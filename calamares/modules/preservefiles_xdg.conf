# Single-file desktop configuration carried from the live session into the
# target install. Each entry is optional, so a flavour that does not ship the
# file simply skips it. preservefiles copies from the host (src) to the
# target (dest); perm keeps these world-readable like normal /etc/xdg config.
---
files:
  - src: /etc/xdg/lxqt/session.conf
    dest: /etc/xdg/lxqt/session.conf
    optional: true
  - src: /etc/xdg/labwc/environment
    dest: /etc/xdg/labwc/environment
    optional: true

perm: "root:root:0644"
