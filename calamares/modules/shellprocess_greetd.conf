# Preserve the live greeter command on the target's greetd configuration.
#
# Thin wrapper around the aptosid-greetd helper. The reconciliation logic works
# with the greetd config as TOML and must live in a real script: calamares
# expands ${...} in shellprocess commands as its own macros and fails the job
# on any it does not recognise. Runs in the host context (dontChroot: true) so
# the host-side helper and the live /etc/greetd are reachable; it is handed the
# target root (${ROOT}, a known calamares variable).
#
# Sequenced AFTER the displaymanager module: displaymanager owns the target's
# autologin ([initial_session]) decision from the users page, and the helper
# restores the live greeter command and (when autologin is on) the live
# uwsm-managed session command on top of it.
---
dontChroot: true
timeout: 60

script:
    - "- /usr/share/calamares/helpers/aptosid-greetd ${ROOT}"

i18n:
    name: "Apply aptosid greetd configuration"
