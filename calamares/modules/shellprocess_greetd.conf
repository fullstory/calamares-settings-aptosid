# greetd configuration passthrough.
#
# Copies the live-session greetd configuration (sway, hyprland, labwc) into the
# target install, then drops the live-only [initial_session] autologin block.
# Runs with dontChroot so source paths refer to the live system; ${ROOT} is the
# target root from the host's point of view. Best-effort (leading "-"): a
# missing source on a given flavour must not abort the install.
#
# Sequenced AFTER the displaymanager module so the live greeter command (e.g.
# tuigreet ... --cmd 'uwsm start hyprland.desktop') wins over the generic
# command displaymanager would otherwise write.
---
dontChroot: true
timeout: 300

script:
    - "- rsync -a /etc/greetd/. ${ROOT}/etc/greetd/."
    - "- sed -i '/\\[initial_session\\]/,/user = .*/d' ${ROOT}/etc/greetd/config.toml"

i18n:
    name: "Apply aptosid greetd configuration"
