# Regenerate the Hyprland uwsm keyboard drop-in on the target.
#
# Runs chrooted, AFTER the keyboard module has written the target's
# /etc/default/keyboard, so the installed Hyprland session uses the layout
# selected in the installer rather than the live one. Best-effort (leading
# "-"): the helper only exists on Hyprland installs, so it is a no-op
# elsewhere.
---
dontChroot: false
timeout: 30

script:
    - "- /usr/libexec/aptosid-settings-hyprland/keyboard-env"

i18n:
    name: "Configure Hyprland keyboard layout"
