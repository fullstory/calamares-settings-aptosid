# Apply the live media's boot menu theme to the target's GRUB.
#
# The live image declares its boot theme via FLL_GFXBOOT_THEME in
# /etc/default/distro. GRUB's own defaults don't carry it, so map it onto
# GRUB_THEME here (updating an existing line, otherwise appending one) when the
# referenced theme is actually installed. Must run after grubcfg has written
# /etc/default/grub and before the bootloader module runs grub-mkconfig.
# Runs inside the target (dontChroot: false); paths are target-absolute.
---
dontChroot: false
timeout: 60

script:
    - command: |
        - . /etc/default/distro
          theme="/usr/share/grub/themes/${FLL_GFXBOOT_THEME}/theme.txt"
          if [ -n "${FLL_GFXBOOT_THEME}" ] && [ -r "${theme}" ]; then
            if grep -q '^GRUB_THEME=' /etc/default/grub; then
              sed -i "s|^GRUB_THEME=.*|GRUB_THEME=\"${theme}\"|" /etc/default/grub
            else
              printf '\n# Set theme defined by FLL_GFXBOOT_THEME in /etc/default/distro\n' >>/etc/default/grub
              printf 'GRUB_THEME="%s"\n' "${theme}" >>/etc/default/grub
            fi
          fi

i18n:
    name: "Set the boot menu theme"
