# Apply the live media's boot menu theme to the target's GRUB.
#
# Thin wrapper around the aptosid-grub-theme helper. The theme logic sources
# /etc/default/distro and works with shell variables, which must live in a real
# script: calamares expands ${...} in shellprocess commands as its own macros
# and fails the job on any it does not recognise (e.g. FLL_GFXBOOT_THEME). Runs
# in the host context (dontChroot: true) so the host-side helper is reachable;
# it is handed the target root (${ROOT}, a known calamares variable) and edits
# the target's /etc/default/grub. Must run after grubcfg and before the
# bootloader module runs grub-mkconfig.
---
dontChroot: true
timeout: 60

script:
    - "- /usr/share/calamares/helpers/aptosid-grub-theme ${ROOT}"

i18n:
    name: "Set the boot menu theme"
