# Release the kernel/header apt-mark hold inherited from the live image.
#
# The live medium holds the kernel packages (and, being dracut-only, the initrd
# with them) so apt cannot upgrade boot artifacts that live on read-only/FAT
# media; on live media a kernel refresh goes through a whole-image
# `--upgrade <iso>`. An installed system has no such constraint, so restore
# normal native kernel and initramfs updates by releasing the hold. Scoped to
# kernel/header packages so it cannot clobber another intentional hold; the
# leading "-" and `xargs -r` make it a harmless no-op if nothing is held.
# Runs inside the target (dontChroot: false), before the dracut module rebuilds
# the installed initrd.
---
dontChroot: false
timeout: 60

script:
    - "- apt-mark showhold | grep -E '^linux-(image|headers)' | xargs -r apt-mark unhold"

i18n:
    name: "Restore kernel upgrades on the installed system"
