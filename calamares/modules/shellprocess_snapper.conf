# Snapper / btrfs configuration in the target.
#
# When the target root is btrfs (the live image lays down a /.snapshots
# subvolume), set up a snapper "root" config and tune its timeline limits.
# Otherwise the btrfs tooling is irrelevant, so purge it. Runs inside the
# target (dontChroot: false); paths are therefore target-absolute.
---
dontChroot: false
timeout: 120

script:
    - command: |
        - if [ -d /.snapshots ] && [ -x /usr/bin/snapper ]; then
            umount /.snapshots
            rmdir /.snapshots
            snapper --no-dbus --config root create-config --fstype btrfs /
            btrfs subvolume delete /.snapshots
            mkdir /.snapshots
            # https://github.com/kdave/btrfsmaintenance#tuning-periodic-snapshotting
            sed -i 's#TIMELINE_LIMIT_HOURLY="10"#TIMELINE_LIMIT_HOURLY="12"#' /etc/snapper/configs/root
            sed -i 's#TIMELINE_LIMIT_DAILY="10"#TIMELINE_LIMIT_DAILY="7"#'    /etc/snapper/configs/root
            sed -i 's#TIMELINE_LIMIT_WEEKLY="0"#TIMELINE_LIMIT_WEEKLY="1"#'   /etc/snapper/configs/root
            sed -i 's#TIMELINE_LIMIT_MONTHLY="10"#TIMELINE_LIMIT_MONTHLY="0"#' /etc/snapper/configs/root
            sed -i 's#TIMELINE_LIMIT_YEARLY="10"#TIMELINE_LIMIT_YEARLY="0"#'  /etc/snapper/configs/root
          else
            DEBIAN_FRONTEND=noninteractive dpkg --purge snapper btrfs-assistant btrfsmaintenance
          fi

i18n:
    name: "Configure btrfs snapshots"
