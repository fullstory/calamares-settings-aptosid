# Desktop configuration passthrough.
#
# Copies live-session desktop configuration from the host (the running live
# system) into the target install. Runs with dontChroot so that the source
# paths refer to the live system; ${ROOT} is the target root from the host's
# point of view. Every command is best-effort (leading "-"): a missing source
# on a given flavour must not abort the install.
---
dontChroot: true
timeout: 300

script:
    # root's home dotfiles, seeded from /etc/skel
    - "- cp /etc/skel/.bash_logout  ${ROOT}/root/.bash_logout"
    - "- cp /etc/skel/.bash_profile ${ROOT}/root/.bash_profile"
    - "- cp /etc/skel/.bashrc       ${ROOT}/root/.bashrc"
    - "- cp /etc/skel/.profile      ${ROOT}/root/.profile"

    # sync the live skel so first-login desktop configuration matches
    - "- rsync -a /etc/skel/. ${ROOT}/etc/skel/."

    # greetd (sway, hyprland, labwc): copy config, then drop the
    # live-only [initial_session] autologin block
    - "- rsync -a /etc/greetd/. ${ROOT}/etc/greetd/."
    - "- sed -i '/\\[initial_session\\]/,/user = .*/d' ${ROOT}/etc/greetd/config.toml"

i18n:
    name: "Apply aptosid desktop configuration"
